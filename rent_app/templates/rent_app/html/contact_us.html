<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contect us</title>
    {% include 'rent_app/common/common_css.html'   %}
<style>
    .reg-form{
        background-color: rgb(231, 122, 204);
        height: 600px;
        padding: 10px;
        border: 5px solid rgba(236, 183, 102, 0.952); 
        border-radius: 10px;
        margin: auto;
        margin-top: 50px;
        width: 40%;
    }
</style>
</head>
<body style="background-color: aquamarine;">
  <div class="main-div">
      <!-- Header code include here -->
    {% include 'rent_app/common/header.html'%}
  <div class="reg-form">
        <form action="/contact/" method="post">
        {% csrf_token %}
        <h6>Feel Free to Read us</h6>
        <h1 class="text-center">Contact Us</h1>
<div class="input-group mb-3">
  <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
  <input type="text" class="form-control" placeholder="Name" name="Name">
</div>
<div class="input-group mb-3">
  <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
  <input type="Email" class="form-control" placeholder="Email" name="Email">
</div>
<div class="input-group mb-3">
  <span class="input-group-text"><i class="fa-solid fa-phone"></i></span>
  <input type="Phone" class="form-control" placeholder="Phone" name="Phone">
</div>
<div class="input-group mb-3">
  <span class="input-group-text"></span>
  <input type="question" class="form-control" placeholder="question" name="question">
</div>
<div class="text-center mt-2">
<button class="btn btn-primary mx-auto"><i class="fas fa-lock">Submit</i></button>
</div>
    </form>
  </div>
</div>

  <!-- footer code included here -->
 {% include 'rent_app/common/footer.html'%}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
</body>
</html>
