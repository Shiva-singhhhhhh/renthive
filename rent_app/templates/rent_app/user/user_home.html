<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — RentHive</title>
  {% include 'rent_app/common/common_css.html' %}
</head>
<body>
<div class="main-div rh-dash-body">
  {% include 'rent_app/user/user_header.html' %}

  <div class="rh-dash-container">

    <!-- Profile Card -->
    <div class="rh-profile-card">
      <img src="/media/{{ user_info.profile_pic }}" alt="Profile" class="profile-avatar"
        onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      <div style="display:none; width:100px; height:100px; border-radius:50%; background:linear-gradient(135deg,var(--surface),var(--accent)); align-items:center; justify-content:center; font-size:2.5rem; color:#fff; border:3px solid var(--accent); margin:0 auto 1.2rem; box-shadow:0 0 20px rgba(245,166,35,0.3);">
        <i class="fa-solid fa-user"></i>
      </div>

      <h3 class="profile-name">{{ user_info.name }}</h3>

      <div class="profile-info">
        <i class="fa-solid fa-envelope"></i>
        <span>{{ user_info.email }}</span>
      </div>
      <div class="profile-info">
        <i class="fa-solid fa-phone"></i>
        <span>{{ user_info.phone }}</span>
      </div>

      <div style="display:flex; gap:0.8rem; justify-content:center; margin-top:1.5rem; flex-wrap:wrap;">
        <a href="/view_product/" class="btn-rh-primary" style="font-size:0.88rem; padding:0.55rem 1.4rem;">
          <i class="fa-solid fa-box-open"></i> Browse Products
        </a>
        <a href="/user_feedback/" class="btn-rh-outline" style="font-size:0.88rem; padding:0.53rem 1.4rem;">
          <i class="fa-solid fa-star"></i> Leave Review
        </a>
      </div>
    </div>

  </div>
</div>

{% include 'rent_app/common/footer.html' %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
</body>
</html>
