<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    {% include 'rent_app/common/common_css.html' %}
<style>
    .reg-form{
        background-color: #f03f32;
        height: auto;
        padding: 10px;
        border: 5px solid #5f2c00; 
        border-radius: 10px;
        margin: auto;
        margin-top: 50px;
        width: 40%;
    }
</style>
</head>
<body style="background-color: #826611;">
  <div class="main-div">
      <!-- Header code include here -->
    {% include 'rent_app/owner/owner_header.html'%}
  <div class="container-fluid d-flex" style="background-color:#f9608d; justify-content: center;">
  <span style=" margin-left: 20px;font-size: 30px; justify-content: center;">Login Form</span>
 </div>
  <div class="reg-form">
<form action="/owner_login/" method="post">
  {% csrf_token %}
<div class="input-group mb-3">
  <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
  <input type="Email" class="form-control" placeholder="Email" name="email">
</div>
<div class="input-group mb-3">
    <span class="input-group-text"><i class="fa-solid fa-key"></i></span>
    <input type="Password" class="form-control" placeholder="Password" name="password">
</div>
<div class="text-center mt-2">
<button class="btn btn-secondary mx-auto"><i class="fas fa-lock">Submit</i></button>
</div>
    </form>
  </div>
</div>

  <!-- footer code included here -->
 {% include 'rent_app/common/footer.html'%}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
</body>
</html>
