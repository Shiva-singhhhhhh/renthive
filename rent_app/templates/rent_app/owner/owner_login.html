<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owner Login — RentHive</title>
  {% include 'rent_app/common/common_css.html' %}
</head>
<body>
<div class="main-div">
  {% include 'rent_app/owner/owner_header.html' %}

  <section class="rh-form-section" style="padding-top:5rem;">
    <div class="rh-form-card">
      <div class="form-icon"><i class="fa-solid fa-building"></i></div>
      <h2 class="form-title">Owner Login</h2>
      <p class="form-subtitle">Access your RentHive owner dashboard</p>

      <!-- action/fields preserved exactly -->
      <form action="/owner_login/" method="post">
        {% csrf_token %}

        <div class="mb-3">
          <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
            <input type="Email" class="form-control" placeholder="Email Address" name="email">
          </div>
        </div>

        <div class="mb-4">
          <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-key"></i></span>
            <input type="Password" class="form-control" placeholder="Password" name="password">
          </div>
        </div>

        <button type="submit" class="btn-submit">
          <i class="fa-solid fa-lock me-2"></i>Sign In as Owner
        </button>
      </form>

      <div style="text-align:center; margin-top:1.5rem; font-size:0.88rem; color:var(--text-muted);">
        New owner?
        <a href="/owner_reg/" style="color:var(--accent); font-weight:600; text-decoration:none;"> Register here</a>
      </div>
      <div style="text-align:center; margin-top:0.6rem; font-size:0.85rem; color:var(--text-muted);">
        Renter? <a href="/user_login/" style="color:var(--accent); font-weight:600; text-decoration:none;">User Login →</a>
      </div>
    </div>
  </section>
</div>

{% include 'rent_app/common/footer.html' %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
</body>
</html>
