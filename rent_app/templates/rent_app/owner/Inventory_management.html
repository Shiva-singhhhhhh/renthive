<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Management — RentHive</title>
  {% include 'rent_app/common/common_css.html' %}
</head>
<body>
<div class="main-div rh-dash-body">
  {% include 'rent_app/owner/owner_header.html' %}

  <section class="rh-form-section" style="padding-top:5rem;">
    <div class="rh-form-card" style="max-width:540px;">
      <div class="form-icon"><i class="fa-solid fa-pen-to-square"></i></div>
      <h2 class="form-title">Manage Inventory</h2>
      <p class="form-subtitle">Update rental details and manage your product listing.</p>

      <!-- action/field names preserved exactly -->
      <form method="post" action="/manage_inventory_post/" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="mb-3">
          <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-mobile-button"></i></span>
            <input type="phone" class="form-control" placeholder="Renter Phone" name="phone"
              value="{{ product_key.user_phone }}">
          </div>
        </div>

        <div class="mb-3">
          <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-bell"></i></span>
            <input type="text" class="form-control" placeholder="Rental Duration" name="duration"
              value="{{ product_key.duration }}">
          </div>
        </div>

        <div class="mb-3">
          <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-calendar"></i></span>
            <input type="text" class="form-control" placeholder="Rented Date" name="rented_date"
              readonly value="{{ product_key.rented_date }}">
          </div>
        </div>

        <div class="mb-3">
          <label style="display:block; font-size:0.85rem; color:var(--text-muted); margin-bottom:0.4rem;">
            <i class="fa-solid fa-address-card me-1"></i> ID Proof Document
          </label>
          <input type="file" class="form-control" name="id_proof" value="{{ product_key.id_proof }}">
        </div>

        <div class="mb-4">
          <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-rotate-right"></i></span>
            <input type="date" class="form-control" name="return_date" placeholder="Return Date">
          </div>
        </div>

        <button type="submit" class="btn-submit">
          <i class="fa-solid fa-floppy-disk me-2"></i>Save Changes
        </button>
      </form>
    </div>
  </section>
</div>

{% include 'rent_app/common/footer.html' %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
</body>
</html>
