<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Product — RentHive</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  {% include 'rent_app/common/common_css.html' %}
</head>
<body>
<div class="main-div rh-dash-body">
  {% include 'rent_app/owner/owner_header.html' %}

  <section class="rh-form-section" style="padding-top:5rem;">
    <div class="rh-form-card" style="max-width:540px;">
      <div class="form-icon"><i class="fa-solid fa-plus"></i></div>
      <h2 class="form-title">Add Product</h2>
      <p class="form-subtitle">List a new item and start earning from your unused assets.</p>

      <!-- action/field names preserved exactly -->
      <form action="/add_product/" method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="mb-3">
          <div class="input-group">
            <span class="input-group-text"><i class="fa-brands fa-product-hunt"></i></span>
            <input type="text" class="form-control" placeholder="Product Name" name="product_name" required>
          </div>
        </div>

        <div class="mb-3">
          <label style="display:block; font-size:0.85rem; color:var(--text-muted); margin-bottom:0.4rem;">
            <i class="fa-solid fa-list me-1"></i> Category
          </label>
          <select class="form-select" name="category" required>
            <option value="select category">Select Category</option>
            <option value="Electronic Goods ">Electronic Goods</option>
            <option value="Furniture">Furniture</option>
          </select>
        </div>

        <div class="mb-3">
          <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-comment"></i></span>
            <input type="text-area" class="form-control" placeholder="Product Description" name="description" required>
          </div>
        </div>

        <div class="mb-3">
          <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-indian-rupee-sign"></i></span>
            <input type="text" class="form-control" placeholder="Price per day (₹)" name="price" required>
          </div>
        </div>

        <div class="mb-4">
          <label style="display:block; font-size:0.85rem; color:var(--text-muted); margin-bottom:0.4rem;">
            <i class="fa-solid fa-image me-1"></i> Product Photo
          </label>
          <input type="file" class="form-control" name="product_pic" required>
        </div>

        <button type="submit" class="btn-submit">
          <i class="fa-solid fa-plus me-2"></i>Add Product
        </button>
      </form>
    </div>
  </section>
</div>

{% include 'rent_app/common/footer.html' %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
</body>
</html>
